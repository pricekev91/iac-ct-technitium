# Technitium DNS Server Configuration
# -------------------------------------
# This file configures the DNS server behavior for the Technitium DNS Server container.
# For full documentation, see: https://technitium.com/dns/index.html#/documentation

[Service]
# DnsServer - Path to the directory where DNS server data is stored
# This is set to /etc/dns which is the volume mount point in docker-compose.yml
DnsServer=/etc/dns

[Network]
# Ports - Ports that the DNS server listens on
# DNS requires UDP and TCP on port 53
Ports=53

# Interface - IP addresses to bind the DNS server to
# Use 0.0.0.0 to bind to all interfaces, or specify individual IPs
Interface=0.0.0.0

[Security]
# UseTlsForDnsOverTls - Enable DNS over TLS (DoT) on port 853
# Requires a valid TLS certificate in /etc/dns/tls
UseTlsForDnsOverTls=false

# UseHttpsForDnsOverHttps - Enable DNS over HTTPS (DoH) on port 443
# Requires a valid TLS certificate in /etc/dns/tls
UseHttpsForDnsOverHttps=false

# BlockCategoryFilters - Block categories of content (Adware, Gambling, Malware, etc.)
# Leave empty to disable category blocking
# Example: BlockCategoryFilters=Adware,Gambling

[Forwarders]
# ForwardingServer - Upstream DNS forwarders
# These are the DNS servers that Technitium will forward queries to
# that it cannot resolve itself
ForwardingServer=8.8.8.8
ForwardingServer=1.1.1.1

[Logging]
# LogLevel - Minimum log level to record (debug, info, warning, error, critical)
LogLevel=info

# LogFiles - Number of log files to keep (1-10)
LogFiles=7

# LogFileSize - Maximum size of each log file in MB
LogFileSize=10
