version: '3.8'
services:
  ct-technitium:
    image: technitium/dns-server:latest
    container_name: ct-technitium
    # Bind to container's dedicated IP (192.168.1.15) so it does NOT conflict with
    # the Proxmox host (192.168.1.10) or hlh-docker (192.168.1.13).
    # Override via CONTAINER_IP env var if needed.
    ports:
      - "${CONTAINER_IP:-192.168.1.15}:53:53/tcp"
      - "${CONTAINER_IP:-192.168.1.15}:53:53/udp"
      - "${CONTAINER_IP:-192.168.1.15}:5380:5380/tcp"
    volumes:
      # Host path /srv/data/technitium is mounted into the LXC at /srv/data (mp0).
      # The container maps that to /etc/dns where Technitium expects its config.
      - /srv/data/technitium:/etc/dns
    restart: always
    cap_add:
      - NET_ADMIN